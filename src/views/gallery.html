<div class="gallery glide">
  <div class="glide__track" data-glide-el="track">
    <ul class="glide__slides">
      <li class="glide__slide">
        <img src="./assets/images/torunos3.jpg" alt="Imagen 1">
      </li>
      <li class="glide__slide">
        <img src="./assets/images/torunos4.jpg" alt="Imagen 2">
      </li>
      <li class="glide__slide">
        <img src="./assets/images/torunos5.jpg" alt="Imagen 3">
      </li>
       <li class="glide__slide">
        <img src="./assets/images/torunos6.jpg" alt="Imagen 3">
      </li>
    </ul>
  </div>

  <!-- Controles opcionales -->
  <div class="glide__arrows" data-glide-el="controls">
    <button class="glide__arrow glide__arrow--left" data-glide-dir="<">Prev</button>
    <button class="glide__arrow glide__arrow--right" data-glide-dir=">">Next</button>
  </div>

  <!-- Paginación opcional -->
  <div class="glide__bullets" data-glide-el="controls[nav]"></div>
</div>
