<div class="glide">
  <div class="glide__track" data-glide-el="track">
    <ul class="glide__slides">
      <li class="glide__slide">
        <img src="./assets/images/torunos3.jpg" alt="Vista a través del cristal">
      </li>
      <li class="glide__slide">
        <img src="./assets/images/torunos4.jpg" alt="Vista panorámica del Río San Pedro">
      </li>
      <li class="glide__slide">
        <img src="./assets/images/torunos5.jpg" alt="Vista de la desembocadura">
      </li>
      <li class="glide__slide">
        <img src="./assets/images/torunos6.jpg" alt="Barcos de pescadores">
      </li>
      <li class="glide__slide">
        <img src="./assets/images/actividades1.jpg" alt="Vista panorámica del muelle de Puerto Real">
      </li>
      <li class="glide__slide">
        <img src="./assets/images/actividades2.jpg" alt="Parque de caravanas del Río San Pedro">
      </li>
      <li class="glide__slide">
        <img src="./assets/images/ocionocturno1.jpg" alt="Festival de carnavales en Puerto Real">
      </li>
      <li class="glide__slide">
        <img src="./assets/images/ocionocturno2.jpg" alt="Paseo marítimo de Puerto Real a la puesta de Sol">
      </li> 
    </ul>
  </div>

  <!-- Controles -->
  <div class="glide__arrows" data-glide-el="controls">
    <button class="glide__arrow glide__arrow--left" data-glide-dir="<"><i class="fa-solid fa-chevron-left"></i></button>
    <button class="glide__arrow glide__arrow--right" data-glide-dir=">"><i class="fa-solid fa-chevron-right"></i></button>
  </div>

  <!-- Paginación -->
  <div class="glide__bullets" data-glide-el="controls[nav]">
    <button data-glide-dir="=0"></button>
    <button data-glide-dir="=1"></button>
    <button data-glide-dir="=2"></button>
    <button data-glide-dir="=3"></button>
    <button data-glide-dir="=4"></button>
    <button data-glide-dir="=5"></button>
    <button data-glide-dir="=6"></button>
  </div>
</div>
